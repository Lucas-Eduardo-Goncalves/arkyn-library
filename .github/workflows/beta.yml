# ==========================================================
# Nome exibido na aba "Actions" do GitHub
# ==========================================================
name: Beta Release

# ==========================================================
# Eventos que disparam este workflow
# ==========================================================
on:
  # Sempre que houver um push...
  push:
    # ...na branch develop
    branches:
      - develop

# ==========================================================
# Lista de trabalhos
# ==========================================================
jobs:
  # Nome interno do trabalho
  publish-beta:
    # Máquina virtual utilizada pelo GitHub
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    # Impede que dois deploys beta aconteçam ao mesmo tempo.
    concurrency:
      group: beta-release
      cancel-in-progress: true

    # Lista de etapas executadas em sequência.
    steps:
      # ------------------------------------------------------
      # Faz o clone do repositório.
      # Equivalente ao comando:
      #
      # git clone ...
      # ------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v5

      # ------------------------------------------------------
      # Garante o ambiente Node.js limpo na máquina.
      # ------------------------------------------------------
      - name: Setup Node.js (NPM Registry Auth)
        uses: actions/setup-node@v4
        with:
          node-version: 26
          registry-url: https://registry.npmjs.org

      # ------------------------------------------------------
      # Instala o Bun.
      # ------------------------------------------------------
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          # Sempre utiliza a versão mais recente.
          bun-version: latest

      # ------------------------------------------------------
      # Buscar pacotes @types/* em dependencies (não devDependencies)
      # ------------------------------------------------------
      - name: Verify
        run: grep -r "@types/" packages/*/package.json | grep -A5 '"dependencies"'

      # ------------------------------------------------------
      # Instala todas as dependências.
      # O --frozen-lockfile garante que o bun.lock esteja
      # sincronizado com o package.json.
      # ------------------------------------------------------
      - name: Install dependencies
        run: bun install --frozen-lockfile

      # ------------------------------------------------------
      # Verifica vulnerabilidades.
      # ------------------------------------------------------
      - name: Security audit
        run: bun run all:audit

      # ------------------------------------------------------
      # Compila todos os pacotes.
      # ------------------------------------------------------
      - name: Build packages
        run: bun run all:build

      # ------------------------------------------------------
      # Executa a verificação de tipos.
      # ------------------------------------------------------
      - name: Run typecheck
        run: bun run all:typecheck

      # ------------------------------------------------------
      # Executa todos os testes.
      # Caso algum falhe, o workflow para aqui.
      # ------------------------------------------------------
      - name: Run tests
        run: bun run all:test

      # ------------------------------------------------------
      # Publica todos os pacotes utilizando a tag beta.
      # O 'setup-node' configurado acima exige estritamente
      # o nome 'NODE_AUTH_TOKEN' para injetar a secret.
      # ------------------------------------------------------
      - name: Publish beta
        run: bun run all:publish:beta
